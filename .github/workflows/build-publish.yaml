---
name: CI/CD - Build and Publish Images

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  build-amd64:
    name: ⚡ AMD64 (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: api
            dockerfile: api/Dockerfile
          - component: web-ui
            context: web-ui
            dockerfile: web-ui/Dockerfile
          - component: trade-writer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.trade-writer
          - component: db-syncer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.db-syncer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set lowercased repo
        id: vars
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - name: Log in to registry
        if: github.event_name != 'pull_request' && github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push AMD64
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system' }}
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.REPO_LOWER }}/${{ matrix.component }}:latest-amd64
          cache-from: type=gha,scope=${{ matrix.component }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-amd64

  build-arm64:
    name: 🐢 ARM64 (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: api
            dockerfile: api/Dockerfile
          - component: web-ui
            context: web-ui
            dockerfile: web-ui/Dockerfile
          - component: trade-writer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.trade-writer
          - component: db-syncer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.db-syncer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Set lowercased repo
        id: vars
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - name: Log in to registry
        if: github.event_name != 'pull_request' && github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ARM64
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' && github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system' }}
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.REPO_LOWER }}/${{ matrix.component }}:latest-arm64
          cache-from: type=gha,scope=${{ matrix.component }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-arm64

  merge-manifests:
    name: 🔗 Merge Manifests (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    if: github.event_name != 'pull_request' && github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system'
    strategy:
      matrix:
        component: [api, web-ui, trade-writer, db-syncer]
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Multi-Arch Manifest
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          BASE_IMG="${{ env.REGISTRY }}/$REPO_LOWER/${{ matrix.component }}"
          
          docker buildx imagetools create \
            -t $BASE_IMG:latest \
            $BASE_IMG:latest-amd64 \
            $BASE_IMG:latest-arm64
