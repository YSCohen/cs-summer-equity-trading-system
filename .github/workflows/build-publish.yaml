---
name: CI/CD - Build and Publish Images

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  # ==========================================
  # 🚀 FAST BUILD: Standard AMD/Intel
  # ==========================================
  build-amd64:
    name: ⚡ AMD64 (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: api
            dockerfile: api/Dockerfile
          - component: web-ui
            context: web-ui
            dockerfile: web-ui/Dockerfile
          - component: trade-writer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.trade-writer
          - component: db-syncer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.db-syncer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: |
          github.event_name != 'pull_request' &&
          github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}
          # Appending -amd64 to safely store it until the merge job
          tags: |
            type=raw,value=latest-amd64,enable={{is_default_branch}}
            type=sha,prefix=sha-,suffix=-amd64,format=short

      - name: Build and push AMD64
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: |
            ${{ github.event_name != 'pull_request' &&
                github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-amd64

  # ==========================================
  # 🐢 SLOW BUILD: Emulated Apple Silicon (ARM)
  # ==========================================
  build-arm64:
    name: 🐢 ARM64 (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: api
            dockerfile: api/Dockerfile
          - component: web-ui
            context: web-ui
            dockerfile: web-ui/Dockerfile
          - component: trade-writer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.trade-writer
          - component: db-syncer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile.db-syncer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (Required for ARM Emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: |
          github.event_name != 'pull_request' &&
          github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}
          # Appending -arm64 so it doesn't overwrite the fast AMD tag
          tags: |
            type=raw,value=latest-arm64,enable={{is_default_branch}}
            type=sha,prefix=sha-,suffix=-arm64,format=short

      - name: Build and push ARM64
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: |
            ${{ github.event_name != 'pull_request' &&
                github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-arm64

  # ==========================================
  # 🔗 MERGE MANIFESTS: Combine AMD & ARM
  # ==========================================
  merge-manifests:
    name: 🔗 Merge Manifests (${{ matrix.component }})
    runs-on: ubuntu-latest
    # Wait for both builds to finish before trying to merge them
    needs: [build-amd64, build-arm64]

    # Only run the merge job if we actually pushed the images to the main repo
    if: |
      github.event_name != 'pull_request' &&
      github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
          - component: web-ui
          - component: trade-writer
          - component: db-syncer

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Multi-Arch Manifest
        run: |
          # Calculate the short git SHA format (first 7 characters)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BASE_IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}"

          # Use docker buildx imagetools to stitch the temporary tags into final official tags
          docker buildx imagetools create \
            -t $BASE_IMG:latest \
            -t $BASE_IMG:sha-$SHORT_SHA \
            $BASE_IMG:latest-amd64 \
            $BASE_IMG:latest-arm64
