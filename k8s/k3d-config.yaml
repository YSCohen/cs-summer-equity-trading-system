---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: dev-cluster

network: k3d-network

kubeAPI:
  host: "k3d-dev-cluster-serverlb"
  hostPort: "6443"
env:
  - envVar: K3D_FIX_DNS=0
    nodeFilters:
      - "all"
volumes:
  - volume: ${HOST_ROOT}/k8s/custom-resolv.conf:/tmp/custom-resolv.conf:z
    nodeFilters:
      - "server:*"
      - "agent:*"
servers: 1
agents: 2
image: rancher/k3s:v1.36.1-k3s1
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
  k3s:
    extraArgs:
      - arg: --kubelet-arg=eviction-hard=imagefs.available<5%,nodefs.available<5%
        nodeFilters:
          - server:*
          - agent:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
