---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# images:
#   - name: api-image
#     newName: ghcr.io/maxrabz/fastapi
#   # newTag: working
#   - name: web-ui-image
#     newName: ghcr.io/williamtrump/equity-trading-frontend
#   - name: db-syncer-image
#     newName: ghcr.io/yscohen/db-syncer
#   - name: trade-writer-image
#     newName: ghcr.io/yscohen/trade-writer

patches:
  - target:
      kind: Deployment
      name: fastapi-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fastapi-api
      spec:
        template:
          spec:
            containers:
              - name: fastapi
                env:
                  - name: ENVIRONMENT
                    value: "dev-will"
