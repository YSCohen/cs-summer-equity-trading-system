---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/apps
  - gzip-middleware.yaml

images:
  # - name: ghcr.io/sm26-industrial-software-dev/api
  #   newName: ghcr.io/maxrabz/fastapi
  # # newTag: working
   - name: ghcr.io/sm26-industrial-software-dev/web-ui
     newName: ghcr.io/williamtrump/equity-trading-frontend

patches:
  - target:
      kind: Deployment
      name: fastapi-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fastapi-api
      spec:
        template:
          spec:
            containers:
              - name: fastapi
                env:
                  - name: ENVIRONMENT
                    value: "dev-will"
  # Local laptop dev only (dev-will): base gives Streamlit just 100m CPU
  # requested / 500m limit. Under cluster-wide CPU contention that's not
  # enough to reliably serve the AgGrid component's iframe/JS bundle before
  # the browser gives up ("Your app is having trouble loading the ...
  # component"). Raising the *request* (not just the limit) gives these pods
  # a bigger cpu.shares weight so the scheduler favors them under contention,
  # not just a higher ceiling.
  - target:
      kind: Deployment
      name: streamlit
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: streamlit
      spec:
        template:
          spec:
            containers:
              - name: streamlit
                resources:
                  requests:
                    cpu: "300m"
                    memory: "512Mi"
                  limits:
                    cpu: "1000m"
                    memory: "1Gi"
  # Local laptop dev only (dev-will): chain the new gzip-compress middleware
  # (gzip-middleware.yaml) in front of the existing streamlit-fallback
  # middleware so AgGrid's ~4.6MB JS bundle is compressed in transit instead
  # of sent raw. Only adds to the annotation value -- affinity and the
  # session-cookie-name annotations from base are untouched.
  - target:
      kind: Ingress
      name: streamlit-ingress
    patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: streamlit-ingress
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: "networking-gzip-compress@kubernetescrd,networking-streamlit-fallback@kubernetescrd"
