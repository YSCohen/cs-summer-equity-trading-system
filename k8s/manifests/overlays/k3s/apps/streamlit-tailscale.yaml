---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tailscale-ui-entry
  namespace: backend  # <-- Change if your UI is in a different namespace
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - ui
  rules:
    - host: ui
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik-bridge
                port:
                  number: 80
