---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/apps
  - streamlit-tailscale.yaml

patches:
  - path: ingress-overwrite.yaml
  - patch: |-
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: streamlit-fallback
      $patch: delete
