---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PgBouncer/Postgres to become reachable..."
              until nc -z pgbouncer.data.svc.cluster.local 6432; do
                echo "Database not ready. Sleeping 2 seconds..."
                sleep 2
              done
              echo "Database is online! Proceeding with FastAPI startup."
      containers:
        - name: fastapi
          image: ghcr.io/maxrabz/fastapi:working
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: db-credentials
          env:
            - name: LOGGING_CONFIG
              value: '{"version":1,"disable_existing_loggers":false,"formatters":{"json":{"()":"pythonjsonlogger.jsonlogger.JsonFormatter"}},"handlers":{"console":{"class":"logging.StreamHandler","formatter":"json"}},"root":{"level":"INFO","handlers":["console"]}}'
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ENVIRONMENT
              value: "base"
            - name: REDIS_HOST
              value: "redis.data.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: TRADE_STREAM
              value: "trade_stream"

            # Explicit mapping to the new PG_ROUTING variables
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_ROUTING_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_ROUTING_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_DATABASE
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
