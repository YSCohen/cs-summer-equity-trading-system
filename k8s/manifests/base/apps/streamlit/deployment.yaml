---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
        - name: streamlit
          image: web-ui-image
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: BACKEND_URL
              value: "http://fastapi-service.backend.svc.cluster.local"
            - name: WORKER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
