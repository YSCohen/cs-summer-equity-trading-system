---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-syncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-syncer
  template:
    metadata:
      labels:
        app: db-syncer
    spec:
      initContainers:
        - name: wait-for-loki
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Loki to become reachable..."
              until nc -z loki-stack.monitoring.svc.cluster.local 3100; do
                echo "Loki not ready. Sleeping 2 seconds..."
                sleep 2
              done
              echo "Loki is online!"
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PgBouncer/Postgres to become reachable..."
              until nc -z pgbouncer.data.svc.cluster.local 6432; do
                echo "Database not ready. Sleeping 2 seconds..."
                sleep 2
              done
              echo "Database is online! Proceeding with db-syncer startup."
      containers:
        - name: db-syncer
          image: ghcr.io/yscohen/db-syncer:latest
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD

            # Explicitly load the routing variables for interpolation
            - name: PG_ROUTING_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_ROUTING_HOST
            - name: PG_ROUTING_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_ROUTING_PORT
            - name: PG_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_DATABASE

            # Build the connection string
            - name: POSTGRES_CONFIG
              value: "host=$(PG_ROUTING_HOST) port=$(PG_ROUTING_PORT) user=$(POSTGRES_USER) password=$(POSTGRES_PASSWORD) dbname=$(PG_DATABASE)"

            - name: REDIS_URL
              value: "redis://redis.data.svc.cluster.local:6379/"
            - name: RUST_LOG
              value: "debug"

            - name: LOKI_URL
              value: "http://loki-stack.monitoring.svc.cluster.local:3100"

            - name: WORKER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
