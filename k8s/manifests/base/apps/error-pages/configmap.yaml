---
apiVersion: v1
kind: ConfigMap
metadata:
  name: error-page-content
  labels:
    app: error-page
data:
  index.html: |
        <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>404</title>
              <style>
                  body {
                      background-color: black;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                  }
                  img {
                      max-width: 100%;
                      max-height: 100%;
                  }
              </style>
          </head>
          <body>
              <img src="https://imgs.xkcd.com/comics/not_available.png" alt="xkcd Not Available">
          </body>
          </html>
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;

        # Try to find the exact file. If not found, immediately serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Catch explicit Nginx 404s and redirect internally to our HTML
        error_page 404 /index.html;
    }
