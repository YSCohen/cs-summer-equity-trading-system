---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: trading-pooler
spec:
  cluster:
    name: trading-db
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "2000"
      default_pool_size: "60"
  template:
    spec:
      containers: []
      initContainers:
        - name: wait-for-primary
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z trading-db-rw.data.svc.cluster.local 5432; do
                echo "Primary not ready. Sleeping 2 seconds..."
                sleep 2
              done
