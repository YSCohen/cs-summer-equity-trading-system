---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data

resources:
  - service.yaml
  - statefulset.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: postgres-init-schema
    files:
      # Adjust the relative path if needed based on your exact folder depth.
      - 01-schema.sql=../../../../../db/init.sql
