---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
spec:
  interval: 1h
  # dependsOn:
  #   - name: loki-stack
  #     namespace: monitoring
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.29.0" # Uses a stable release version
      sourceRef:
        kind: HelmRepository
        name: cnpg
  targetNamespace: cnpg-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
