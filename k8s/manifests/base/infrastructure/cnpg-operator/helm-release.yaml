---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.29.0" 
      sourceRef:
        kind: HelmRepository
        name: cnpg
  targetNamespace: cnpg-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
