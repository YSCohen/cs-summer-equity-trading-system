---
apiVersion: v1
kind: ConfigMap
metadata:
  name: error-page-content
  namespace: frontend
  labels:
    app: error-page
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>404 / 503 | Trading Down</title>
        <style>
            body { background-color: #fff1f2; color: #881337; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
            .box { border-left: 6px solid #e11d48; background: white; padding: 2.5rem; border-radius: 4px; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.1); max-width: 500px; }
            h1 { margin-top: 0; color: #be123c; }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>🚨 Trading Halted</h1>
            <p>The interface has crashed harder than a meme stock.</p>
            <p>Our K8s auto-healing is trying to buy the dip and restore service. Give it a minute and refresh.</p>
            <hr style="border: 0; border-top: 1px solid #ffe4e6; margin: 20px 0;">
            <p style="margin-bottom: 0; font-size: 0.9rem;"><strong>Developer Note:</strong> We are currently accepting donations from the YU Comp Sci department to keep our k8s cluster running. Please sponsor us.</p>
        </div>
    </body>
    </html>
