---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
data:
  pgbouncer.ini: |
    [databases]
    trading = host=postgres.data.svc.cluster.local port=5432 dbname=trading

    [pgbouncer]
    listen_port = 6432
    listen_addr = 0.0.0.0
    auth_type = plain
    auth_file = /etc/pgbouncer/userlist.txt
    admin_users = trade_admin
    pool_mode = transaction
    max_client_conn = 1000
    default_pool_size = 25
