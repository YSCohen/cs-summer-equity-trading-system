---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki-local
        url: http://loki-stack.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: true
      - name: Prometheus
        type: prometheus
        uid: prom-local
        url: http://loki-stack-prometheus-server.monitoring.svc.cluster.local:80
        access: proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-developer-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |-
    {
      "title": "k3d Stats",
      "uid": "9mfU3p-vk",
      "schemaVersion": 34,
      "refresh": "5s",
      "panels": [
        {
          "title": "Postgres Path Live Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 10,
          "options": {
            "enableLogDetails": true,
            "sortOrder": "Ascending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-local" },
              "expr": "{app=\"Postgres\"}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Redis Path Live Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 11,
          "options": {
            "enableLogDetails": true,
            "sortOrder": "Ascending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-local" },
              "expr": "{app=\"Redis\"}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Streamlit Path Live Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 12,
          "options": {
            "enableLogDetails": true,
            "sortOrder": "Ascending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-local" },
              "expr": "{app=\"Streamlit\"}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "FastAPI Path Live Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 13,
          "options": {
            "enableLogDetails": true,
            "sortOrder": "Ascending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-local" },
              "expr": "{app=\"FastAPI\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "FastAPI Live Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "loki", "uid": "loki-local" },
          "options": {
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": true,
            "sortOrder": "Ascending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-local" },
              "expr": "{app=\"booklib\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Active FastAPI Nodes",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prom-local" },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prom-local" },
              "instant": true,
              "expr": "max(kube_deployment_status_replicas_available{deployment=\"booklib-api\"})",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "FastAPI Total CPU Utilization (%)",
          "type": "stat",
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prom-local"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom-local"
              },
              "expr": "sum(irate(container_cpu_usage_seconds_total{namespace=\"backend\", container=\"fastapi\"}[2m])) / (max(kube_deployment_status_replicas_available{deployment=\"booklib-api\"}) * 0.1)",
              "refId": "A",
              "instant": true
            }
          ]
        },
        {
          "id": 5,
          "title": "FastAPI CPU Usage per Pod (Cores)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prom-local"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 20
              },
              "unit": "short"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom-local"
              },
              "expr": "sum(irate(container_cpu_usage_seconds_total{namespace=\"backend\", container=\"fastapi\"}[2m])) by (pod)",
              "refId": "A"
            }
          ]
        }
      ]
    }
