---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This tells Kustomize to go grab the entire "base" stack we just built
resources:
  - ../../base

patches:
  - target:
      kind: HelmRelease
      name: loki-stack
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: loki-stack
      spec:
        values:
          prometheus:
            server:
              global:
                scrape_interval: 15s
