services:
    postgres:
        image: postgres:18-alpine
        container_name: postgres
        environment:
            POSTGRES_USER: trade_admin
            POSTGRES_PASSWORD: super_secret_password
            POSTGRES_DB: trades_database
        ports:
            - "5432:5432"
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql:z

    redis:
        image: redis:8-alpine
        container_name: redis
        ports:
            - "6379:6379"

    trade-writer:
        build:
            context: redis-postgres-syncers
            dockerfile: Containerfile.trade-writer
        container_name: trade-writer
        depends_on:
            - postgres
            - redis
        environment:
            POSTGRES_CONFIG: host=postgres user=trade_admin password=super_secret_password dbname=trades_database
            REDIS_URL: redis://redis:6379/
            REDIS_STREAM_NAME: trade_stream
            REDIS_CONSUMER_GROUP: trade_processor_group
            WORKER_NAME: rust_worker_node_1
            RUST_LOG: debug

    db-syncer:
        build:
            context: redis-postgres-syncers
            dockerfile: Containerfile.db-syncer
        container_name: db-syncer
        depends_on:
            - postgres
            - redis
        environment:
            POSTGRES_CONFIG: host=postgres user=trade_admin password=super_secret_password dbname=trades_database
            REDIS_URL: redis://redis:6379/
            RUST_LOG: debug

    trading-api:
        image: ghcr.io/maxrabz/fastapi:working
        container_name: trading-api
        ports:
            - "8000:8000"
        environment:
            REDIS_HOST: redis
            REDIS_PORT: 6379
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: trade_admin
            POSTGRES_PASSWORD: super_secret_password
            POSTGRES_DB: trades_database
            TRADE_STREAM: trade_stream
        depends_on:
            - redis
            - postgres
